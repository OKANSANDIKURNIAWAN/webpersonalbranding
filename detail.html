    <script>
      function loadProjectDetail() {
        const urlParams = new URLSearchParams(window.location.search);
        const projectId = urlParams.get("id");

        if (typeof projectData === "undefined") {
          console.warn("projectData belum tersedia, tunggu 100ms lagi...");
          setTimeout(loadProjectDetail, 100);
          return;
        }

        if (projectId && projectData[projectId]) {
          const data = projectData[projectId];
          console.log("Loading project:", projectId, data);

          // ===== HERO SECTION =====
          document.getElementById("project-title").textContent = data.title;
          document.getElementById("project-category-year").textContent =
            `${data.category} • ${data.year}`;
          document.getElementById("project-description").textContent =
            data.description;
          document.getElementById("project-main-image").src = data.mainImage;

          // ===== INFO CARDS =====
          // My Role
          const rolesList = document.getElementById("project-roles-list");
          rolesList.innerHTML = ""; // Clear placeholder
          data.roles.forEach((role) => {
            const li = document.createElement("li");
            li.className = "text-white font-medium";
            li.textContent = `— ${role}`;
            rolesList.appendChild(li);
          });

          // Tools
          document.getElementById("project-tools").textContent =
            data.tools.join(" • ");

          // Year & Status
          document.getElementById("project-year-status").textContent =
            data.year;
          document.getElementById("project-tag").textContent = data.tag;

          // ===== HORIZONTAL SCROLL GALLERY =====
          const galleryContainer = document.getElementById("project-gallery");
          galleryContainer.innerHTML = "";

          // Store for lightbox
          window.allGalleryImages = data.gallery;
          let currentLightboxIndex = 0;

          data.gallery.forEach((img, index) => {
            const div = document.createElement("div");
            div.className =
              "overflow-hidden rounded-xl bg-zinc-900 shadow-lg cursor-pointer group";
            div.style.width = "100%";
            div.style.height = "auto";
            div.style.aspectRatio = "16 / 9";

            div.innerHTML = `
              <img 
                src="${img}" 
                alt="Gallery image ${index + 1}"
                class="w-full h-full object-cover group-hover:scale-110 transition-transform duration-500"
              />
            `;

            div.addEventListener("click", () => openLightbox(index));
            galleryContainer.appendChild(div);
          });

          // ===== PROCESS SECTION =====
          document.getElementById("process-idea").textContent =
            "Planning the project scope, objectives, and technical requirements";
          document.getElementById("process-dev").textContent =
            "Building and implementing the solution with attention to detail";
          document.getElementById("project-challenge").textContent =
            data.challenge;
          // Final result stays generic for now

          // ===== LIGHTBOX FUNCTIONALITY =====
          window.openLightbox = function (index) {
            currentLightboxIndex = index;
            const modal = document.getElementById("lightbox-modal");
            const img = document.getElementById("lightbox-image");
            img.src = window.allGalleryImages[index];
            modal.classList.remove("hidden");
            document.body.style.overflow = "hidden";
          };

          window.closeLightbox = function () {
            const modal = document.getElementById("lightbox-modal");
            modal.classList.add("hidden");
            document.body.style.overflow = "";
          };

          window.nextImage = function () {
            currentLightboxIndex =
              (currentLightboxIndex + 1) % window.allGalleryImages.length;
            document.getElementById("lightbox-image").src =
              window.allGalleryImages[currentLightboxIndex];
          };

          window.prevImage = function () {
            currentLightboxIndex =
              (currentLightboxIndex - 1 + window.allGalleryImages.length) %
              window.allGalleryImages.length;
            document.getElementById("lightbox-image").src =
              window.allGalleryImages[currentLightboxIndex];
          };

          // Lightbox event listeners
          document
            .getElementById("lightbox-close")
            .addEventListener("click", closeLightbox);
          document
            .getElementById("lightbox-next")
            .addEventListener("click", nextImage);
          document
            .getElementById("lightbox-prev")
            .addEventListener("click", prevImage);

          // Close on background click
          document
            .getElementById("lightbox-modal")
            .addEventListener("click", (e) => {
              if (e.target.id === "lightbox-modal") closeLightbox();
            });

          // Keyboard navigation
          document.addEventListener("keydown", (e) => {
            const modal = document.getElementById("lightbox-modal");
            if (modal.classList.contains("hidden")) return;
            if (e.key === "ArrowRight") nextImage();
            if (e.key === "ArrowLeft") prevImage();
            if (e.key === "Escape") closeLightbox();
          });

          // ===== LINKS =====
          const linksContainer = document.getElementById("project-links");
          linksContainer.innerHTML = "";
          Object.keys(data.links).forEach((key) => {
            const a = document.createElement("a");
            a.href = data.links[key];
            a.className =
              "px-6 py-3 bg-zinc-900 hover:bg-white hover:text-black text-xs uppercase tracking-widest font-bold transition-all rounded-lg border border-zinc-800";
            a.textContent = key;
            linksContainer.appendChild(a);
          });

          document.title = `${data.title} | Okan Sandi`;
        } else {
          console.error("Project ID:", projectId, "- Data:", projectData);
        }
      }

      // Jalankan saat DOM siap
      if (document.readyState === "loading") {
        document.addEventListener("DOMContentLoaded", loadProjectDetail);
      } else {
        loadProjectDetail();
      }
    </script>

    <!-- Page Transition Script -->
    <script>
      // Fade out saat klik link
      document.querySelectorAll("a[href]").forEach((link) => {
        link.addEventListener("click", function (e) {
          const href = this.getAttribute("href");
          if (href.startsWith("#") || href.startsWith("http")) return;

          e.preventDefault();
          document.body.style.transition = "opacity 0.4s ease";
          document.body.style.opacity = "0";

          setTimeout(() => {
            window.location.href = href;
          }, 400);
        });
      });

      // Fade in saat halaman load
      document.body.style.opacity = "0";
      window.addEventListener("load", () => {
        document.body.style.transition = "opacity 0.5s ease";
        document.body.style.opacity = "1";
      });
    </script>
